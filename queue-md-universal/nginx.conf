# 🔒 SECURITY: Production-grade Nginx Reverse Proxy Configuration with TLS 1.2+ & Hardened Headers

# Rate limiting zone for API requests
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name app.queuemd.com;

    # 🔒 SECURITY: Enforce redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.queuemd.com;

    # 🔒 SECURITY: Hardened SSL/TLS Configurations
    ssl_certificate /etc/letsencrypt/live/app.queuemd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.queuemd.com/privkey.pem;
    
    # Restrict to modern, highly secure TLS protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # Session resumption for latency reduction + security
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Diffie-Hellman parameter for perfect forward secrecy
    # Generate in production via: openssl dhparam -out /etc/nginx/dhparam.pem 4096
    ssl_dhparam /etc/nginx/dhparam.pem;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # 🔒 SECURITY: Strict HTTP Security Headers
    # 1. HSTS (Strict-Transport-Security) for 2 years (includes subdomains & preloading)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # 2. Prevent Content Sniffing (MIME sniffing vulnerability protection)
    add_header X-Content-Type-Options "nosniff" always;
    
    # 3. Clickjacking Protection (Prevent embedding in frames/iframes)
    add_header X-Frame-Options "DENY" always;
    
    # 4. Cross-Site Scripting (XSS) Legacy Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 5. Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 6. Permissions Policy (Disables browser hardware integrations except self payment)
    add_header Permissions-Policy "geolocation=(), midi=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), fullscreen=(self), payment=()" always;

    # Compression Settings
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;

    # Root Directory for static React build assets
    root /var/www/queuemd/client;
    index index.html;

    # 1. Serve SPA static assets with aggressive caching
    location / {
        try_files $uri $uri/ /index.html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 2. Reverse Proxy and Rate Limit API Traffic to Node.js/Express Backend
    location /api/ {
        # Apply rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://localhost:5000/; # Matches node container/server listening port
        proxy_http_version 1.1;
        
        # Connection headers for WebSockets support (real-time queue update sync)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard proxy mapping headers
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # IP auditing preservation (Preserves client IP for express analytics logs)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 🔒 SECURITY: Restrict file upload sizes to prevent EMR disk filling DOS
        client_max_body_size 10M;
    }

    # 3. Static Media uploads caching & isolation (Cloudinary fallback config)
    location /uploads/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}
